<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<nav th:fragment="header" class="bg-white shadow-sm border-b px-6 py-4 flex justify-between items-center mb-6">
    <a th:href="@{/dashboard}" class="text-xl font-bold text-blue-600 hover:text-blue-700 transition">
        TeamTask
    </a>

    <div class="flex items-center gap-6">
        <a th:href="@{/tasks/new}"
           class="bg-blue-600 text-white px-4 py-2 rounded text-sm font-medium hover:bg-blue-700 transition">
            + New Task
        </a>

        <a sec:authorize="hasRole('ADMIN')"
           th:href="@{/manage}"
           class="text-gray-600 hover:text-blue-600 text-sm font-medium">
            Manage
        </a>

        <div class="flex items-center gap-4 border-l pl-6 h-8"> <span class="text-sm font-semibold text-gray-800 flex items-center"
                                                                      th:text="${#authentication.principal.firstName + ' ' + #authentication.principal.lastName}">
                User Name
            </span>

            <form th:action="@{/logout}" method="post" class="flex items-center">
                <button type="submit"
                        class="text-xs font-medium text-red-500 hover:text-red-700 px-2 py-1 rounded border border-transparent hover:border-red-200 transition">
                    Logout
                </button>
            </form>
        </div>
    </div>
</nav>

</body>
</html>
