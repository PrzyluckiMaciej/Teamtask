<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<nav th:fragment="header" class="bg-white shadow-sm border-b px-6 py-4 flex justify-between items-center mb-6">
    <a th:href="@{/dashboard}" class="text-xl font-bold text-blue-600 hover:text-blue-700 transition">
        TeamTask
    </a>

    <div class="flex items-center gap-6">
        <a th:href="@{/tasks/new}"
           class="bg-blue-600 text-white px-4 py-2 rounded text-sm font-medium hover:bg-blue-700 transition">
            + New Task
        </a>

        <a sec:authorize="hasRole('ADMIN')"
           th:href="@{/manage}"
           class="text-gray-600 hover:text-blue-600 text-sm font-medium">
            Manage
        </a>

        <div class="relative group">
            <button class="flex items-center gap-2 px-3 py-2 rounded-md hover:bg-gray-100 transition">
                <div class="w-8 h-8 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-bold">
                    <span th:text="${#strings.toUpperCase(#strings.substring(#authentication.principal.firstName, 0, 1))}">U</span>
                </div>
                <span class="text-sm font-semibold text-gray-800 flex items-center"
                      th:text="${#authentication.principal.firstName + ' ' + #authentication.principal.lastName}">
                    User Name
                </span>
                <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                </svg>
            </button>

            <div class="absolute right-0 top-full w-48 bg-white rounded-md shadow-lg border border-gray-200 z-50 hidden group-hover:block hover:block">
                <div class="py-1">
                    <a th:href="@{/profile}"
                       class="flex items-center gap-2 px-4 py-3 text-sm text-gray-700 hover:bg-gray-100 transition">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                        My Profile
                    </a>
                    <div class="border-t border-gray-100"></div>
                    <form th:action="@{/logout}" method="post" class="m-0">
                        <button type="submit"
                                class="flex items-center gap-2 w-full text-left px-4 py-3 text-sm text-red-600 hover:bg-gray-100 transition">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                            </svg>
                            Logout
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</nav>

<style>
    .group:hover .group-hover\:block {
        display: block;
    }
</style>

</body>
</html>
