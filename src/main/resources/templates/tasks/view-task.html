<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>TeamTask - Task Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
<nav class="bg-white shadow-sm border-b px-6 py-4 flex justify-between items-center">
    <h1 class="text-xl font-bold text-blue-600">Task Details</h1>
    <div class="flex items-center gap-4">
        <a th:href="@{/dashboard}" class="text-gray-600 hover:text-gray-800">← Back to Dashboard</a>
        <span class="text-gray-600" th:text="${#authentication.name}">User</span>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="text-sm text-red-500 hover:underline">Logout</button>
        </form>
    </div>
</nav>

<main class="p-8">
    <div class="max-w-4xl mx-auto">
        <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
            <!-- Task Header -->
            <div class="flex justify-between items-start mb-8">
                <div class="flex-1">
                    <h1 class="text-3xl font-bold text-gray-800 mb-2" th:text="${task.title}">Task Title</h1>
                    <div class="flex items-center gap-3">
                        <span th:text="${task.stage}"
                              th:classappend="${
                                task.stage.name() == 'NEW' ? 'bg-gray-100 text-gray-700' :
                                task.stage.name() == 'IN_PROGRESS' ? 'bg-yellow-100 text-yellow-700' :
                                task.stage.name() == 'TESTING' ? 'bg-purple-100 text-purple-700' :
                                task.stage.name() == 'RESOLVED' ? 'bg-green-100 text-green-700' :
                                'bg-red-100 text-red-700'
                              }"
                              class="px-3 py-1 rounded-full text-sm font-medium uppercase">
                            STAGE
                        </span>
                        <span class="text-sm text-gray-500">
                            Created: <span th:text="${#temporals.format(task.createdAt, 'MMM dd, yyyy')}">Date</span>
                        </span>
                    </div>
                </div>
            </div>

            <!-- Edit Form -->
            <form th:action="@{/tasks/{id}(id=${task.id})}" th:method="put" class="space-y-6">
                <!-- Title Field -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Title</label>
                    <input type="text" name="title" th:value="${task.title}"
                           class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                           required>
                </div>

                <!-- Description Field -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                    <textarea name="description" rows="5"
                              class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                              th:text="${task.description}"></textarea>
                </div>

                <!-- Status Field -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Status</label>
                    <select name="stage"
                            class="w-full p-3 border border-gray-300 rounded-lg bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        <option th:each="stage : ${stages}"
                                th:value="${stage}"
                                th:selected="${stage == task.stage}"
                                th:text="${stage}">
                        </option>
                    </select>
                </div>

                <!-- Assignee Field -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Assignee</label>
                    <select name="assigneeId"
                            class="w-full p-3 border border-gray-300 rounded-lg bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        <option value="">-- Unassigned --</option>
                        <option th:each="user : ${users}"
                                th:value="${user.id}"
                                th:selected="${task.assignee != null and task.assignee.id == user.id}"
                                th:text="${user.firstName + ' ' + user.lastName + ' (' + user.role + ')'}">
                        </option>
                    </select>
                </div>

                <!-- Task Metadata -->
                <div class="border-t pt-4 grid grid-cols-2 gap-4 text-sm text-gray-500">
                    <div>
                        <span class="font-medium">Created:</span>
                        <span th:text="${#temporals.format(task.createdAt, 'MMM dd, yyyy HH:mm')}">Date</span>
                    </div>
                    <div>
                        <span class="font-medium">Last Updated:</span>
                        <span th:text="${#temporals.format(task.updatedAt, 'MMM dd, yyyy HH:mm')}">Date</span>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="flex justify-between items-center pt-6 border-t">
                    <div>
                        <form th:if="${#authorization.expression('hasRole(''ADMIN'')')}"
                              th:action="@{/tasks/{id}(id=${task.id})}"
                              th:method="delete"
                              class="inline-block">
                            <button type="submit"
                                    onclick="return confirm('Are you sure you want to delete this task?')"
                                    class="text-red-600 hover:text-red-800 font-medium">
                                Delete Task
                            </button>
                        </form>
                    </div>

                    <div class="flex gap-3">
                        <a th:href="@{/dashboard}"
                           class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">
                            Cancel
                        </a>
                        <button type="submit"
                                class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                            Save Changes
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
