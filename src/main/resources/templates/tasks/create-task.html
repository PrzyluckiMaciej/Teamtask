<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>TeamTask - Create Task</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

<div th:replace="~{fragments/navbar :: header}"></div>

<main class="flex items-center justify-center py-6 px-4">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-5xl overflow-hidden">

        <div class="px-8 py-4 bg-gray-50 border-b flex items-center justify-between">
            <h2 class="text-xl font-bold text-gray-800">New Task</h2>
            <a th:href="@{/dashboard}" class="text-gray-500 hover:text-gray-700 text-sm">Cancel</a>
        </div>

        <form th:action="@{/tasks}" th:object="${task}" method="post" class="p-8">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

                <div class="lg:col-span-2 space-y-4">
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Task Title</label>
                        <input type="text" th:field="*{title}"
                               placeholder="e.g. Fix Login Bug"
                               class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none"
                               required>
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Description</label>
                        <textarea th:field="*{description}" rows="8"
                                  placeholder="Provide details about the task..."
                                  class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                    </div>
                </div>

                <div class="bg-gray-50 p-6 rounded-lg border border-gray-100 space-y-4">
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Assignee</label>
                        <select th:field="*{assigneeId}" class="w-full p-2 border border-gray-300 rounded bg-white text-sm">
                            <option value="">Unassigned</option>
                            <option th:each="user : ${users}" th:value="${user.id}"
                                    th:text="${user.firstName + ' ' + user.lastName}"></option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Severity</label>
                        <select th:field="*{severityId}" class="w-full p-2 border border-gray-300 rounded bg-white text-sm">
                            <option value="">Select Severity</option>
                            <option th:each="severity : ${severities}" th:value="${severity.id}"
                                    th:text="${severity.severity}"></option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Fix Version</label>
                        <select th:field="*{fixVersionId}" class="w-full p-2 border border-gray-300 rounded bg-white text-sm">
                            <option value="">Select Version</option>
                            <option th:each="version : ${fixVersions}" th:value="${version.id}" th:text="${version.version}"></option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Type</label>
                        <select th:field="*{taskTypeId}" class="w-full p-2 border border-gray-300 rounded bg-white text-sm">
                            <option value="">Select Type</option>
                            <option th:each="type : ${taskTypes}" th:value="${type.id}" th:text="${type.type}"></option>
                        </select>
                    </div>

                    <div class="pt-4">
                        <button type="submit"
                                class="w-full bg-blue-600 text-white py-3 rounded shadow-md hover:bg-blue-700 transition font-bold">
                            Create Task
                        </button>
                    </div>
                </div>
            </div>
        </form>
    </div>
</main>

</body>
</html>
