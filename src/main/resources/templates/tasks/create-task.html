<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>TeamTask - Create Task</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

<div th:replace="~{fragments/navbar :: header}"></div>

<main class="flex items-center justify-center py-10">
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-lg">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-2xl font-bold text-gray-800">New Task</h2>
            <a th:href="@{/dashboard}" class="text-gray-400 hover:text-gray-600 text-sm">Cancel</a>
        </div>

        <form th:action="@{/tasks}" th:object="${task}" method="post">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Title</label>
                <input type="text" th:field="*{title}"
                       placeholder="e.g. Fix Login Bug"
                       class="w-full p-2 border border-gray-300 rounded focus:ring-blue-500 focus:border-blue-500"
                       required>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                <textarea th:field="*{description}" rows="4"
                          placeholder="Provide details about the task..."
                          class="w-full p-2 border border-gray-300 rounded focus:ring-blue-500 focus:border-blue-500"></textarea>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Assign To</label>
                <select th:field="*{assigneeId}"
                        class="w-full p-2 border border-gray-300 rounded bg-white focus:ring-blue-500 focus:border-blue-500">
                    <option value="" selected>-- Select a Team Member --</option>
                    <option th:each="user : ${users}"
                            th:value="${user.id}"
                            th:text="${user.firstName + ' ' + user.lastName + ' (' + user.role.name + ')'}">
                        User Name (Role Name)
                    </option>
                </select>
                <p class="mt-1 text-xs text-gray-500 italic">You can leave this blank to keep it unassigned.</p>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Severity</label>
                <select th:field="*{severityId}"
                        class="w-full p-2 border border-gray-300 rounded bg-white focus:ring-blue-500 focus:border-blue-500">
                    <option value="" selected>-- Select Severity --</option>
                    <option th:each="severity : ${severities}"
                            th:value="${severity.id}"
                            th:style="'color: ' + ${severity.color}"
                            th:text="${severity.severity}">
                        Severity
                    </option>
                </select>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Fix Version</label>
                <select th:field="*{fixVersionId}"
                        class="w-full p-2 border border-gray-300 rounded bg-white focus:ring-blue-500 focus:border-blue-500">
                    <option value="" selected>-- Select Fix Version --</option>
                    <option th:each="version : ${fixVersions}"
                            th:value="${version.id}"
                            th:text="${version.version}">
                        Version
                    </option>
                </select>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Task Type</label>
                <select th:field="*{taskTypeId}"
                        class="w-full p-2 border border-gray-300 rounded bg-white focus:ring-blue-500 focus:border-blue-500">
                    <option value="" selected>-- Select Task Type --</option>
                    <option th:each="type : ${taskTypes}"
                            th:value="${type.id}"
                            th:text="${type.type}">
                        Type
                    </option>
                </select>
            </div>

            <button type="submit"
                    class="w-full bg-blue-600 text-white py-2.5 rounded shadow hover:bg-blue-700 transition font-semibold">
                Create Task
            </button>
        </form>
    </div>
</main>

</body>
</html>
