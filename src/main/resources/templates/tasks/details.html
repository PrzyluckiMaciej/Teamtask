<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>TeamTask - Task Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
<nav class="bg-white shadow-sm border-b px-6 py-4 flex justify-between items-center">
    <div class="flex items-center gap-4">
        <a th:href="@{/dashboard}" class="text-gray-600 hover:text-gray-800 flex items-center gap-1">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
            </svg>
            Back
        </a>
    </div>
    <div class="flex items-center gap-4">
        <span class="text-gray-600" th:text="${#authentication.name}">User</span>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="text-sm text-red-500 hover:underline">Logout</button>
        </form>
    </div>
</nav>

<main class="p-6">
    <div class="max-w-3xl mx-auto">
        <!-- Header with inline status and actions -->
        <div class="flex justify-between items-start mb-6">
            <h1 class="text-2xl font-bold text-gray-800 mb-1">Details</h1>
            <form th:if="${#authorization.expression('hasRole(''ADMIN'')')}"
                  th:action="@{/tasks/{id}(id=${task.id})}"
                  th:method="delete"
                  class="flex items-center">
                <button type="submit"
                        onclick="return confirm('Are you sure you want to delete this task?')"
                        class="text-sm text-red-600 hover:text-red-800 font-medium px-3 py-1 border border-red-200 rounded hover:bg-red-50">
                    Delete
                </button>
            </form>
        </div>

        <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
            <form th:action="@{/tasks/{id}(id=${task.id})}" th:method="put" class="space-y-5">
                <!-- Title and Status in one row -->
                <div class="grid grid-cols-3 gap-4">
                    <div class="col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Title</label>
                        <input type="text" name="title" th:value="${task.title}"
                               class="w-full p-2.5 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                               required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
                        <select name="stage"
                                class="w-full p-2.5 border border-gray-300 rounded bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            <option th:each="stage : ${stages}"
                                    th:value="${stage}"
                                    th:selected="${stage == task.stage}"
                                    th:text="${stage}">
                            </option>
                        </select>
                    </div>
                </div>

                <!-- Assignee and Metadata -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Assign To</label>
                        <select name="assigneeId" class="w-full p-2.5 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white">
                            <option value="">-- Unassigned --</option>
                            <option th:each="u : ${users}"
                                    th:value="${u.id}"
                                    th:selected="${task.assignee != null && task.assignee.id == u.id}"
                                    th:text="${u.firstName + ' ' + u.lastName + ' (' + u.role.name + ')'}">
                                User Name (Role)
                            </option>
                        </select>
                    </div>
                    <div class="space-y-1 flex flex-col justify-end">
                        <div class="text-sm text-gray-500 flex justify-end items-center gap-2">
                            <span class="text-right" th:text="${#temporals.format(task.createdAt, 'MMM dd, HH:mm')}">Date</span>
                            <span class="text-gray-400">• Created</span>
                        </div>
                        <div class="text-sm text-gray-500 flex justify-end items-center gap-2">
                            <span class="text-right" th:text="${#temporals.format(task.updatedAt, 'MMM dd, HH:mm')}">Date</span>
                            <span class="text-gray-400">• Updated</span>
                        </div>
                    </div>
                </div>

                <!-- Description -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                    <textarea name="description" rows="3"
                              class="w-full p-2.5 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                              th:text="${task.description}"></textarea>
                </div>

                <!-- Action Buttons -->
                <div class="flex justify-end gap-3 pt-4 border-t">
                    <a th:href="@{/dashboard}"
                       class="px-4 py-2 border border-gray-300 rounded text-gray-700 hover:bg-gray-50 text-sm">
                        Cancel
                    </a>
                    <button type="submit"
                            class="px-5 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 text-sm font-medium">
                        Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
