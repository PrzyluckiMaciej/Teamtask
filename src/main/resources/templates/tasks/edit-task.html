<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>TeamTask - Edit Task</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
<div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-lg">
    <div class="flex items-center justify-between mb-6">
        <h2 class="text-2xl font-bold text-gray-800">Edit Task</h2>
        <a th:href="@{/dashboard}" class="text-gray-400 hover:text-gray-600">Cancel</a>
    </div>

    <form th:action="@{/tasks/{id}(id=${taskId})}" th:object="${task}" th:method="put">
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Title</label>
            <input type="text" th:field="*{title}" class="w-full p-2 border rounded" required>
        </div>

        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
            <textarea th:field="*{description}" rows="4" class="w-full p-2 border rounded"></textarea>
        </div>

        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
            <select th:field="*{stage}"
                    class="w-full p-2 border border-gray-300 rounded bg-white focus:ring-blue-500 focus:border-blue-500">
                <option th:each="stage : ${stages}"
                        th:value="${stage}"
                        th:text="${stage}">
                    STATUS
                </option>
            </select>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-1">Assign To</label>
            <select th:field="*{assigneeId}" class="w-full p-2 border rounded bg-white">
                <option value="">-- Unassigned --</option>
                <option th:each="user : ${users}"
                        th:value="${user.id}"
                        th:text="${user.firstName + ' ' + user.lastName}">
                </option>
            </select>
        </div>

        <button type="submit" class="w-full bg-blue-600 text-white font-semibold py-2 rounded hover:bg-blue-700">
            Save Changes
        </button>
    </form>
</div>
</body>
</html>
