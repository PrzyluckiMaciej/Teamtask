<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>TeamTask - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
<div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
    <h2 class="text-2xl font-bold mb-6 text-center text-blue-600">Create Account</h2>
    <div th:if="${error}" class="mb-4 p-4 bg-red-100 border-l-4 border-red-500 text-red-700 rounded-r">
        <div class="flex items-center">
            <svg class="w-5 h-5 mr-3" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path>
            </svg>
            <span class="font-medium" th:text="${error}"></span>
        </div>
    </div>
    <form th:action="@{/register}" th:object="${user}" method="post">
        <div class="grid grid-cols-2 gap-4 mb-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">First Name</label>
                <input type="text" th:field="*{firstName}"
                       class="w-full p-2 border rounded mt-1"
                       :class="${#fields.hasErrors('firstName') ? 'border-red-500' : ''}"
                       required>
                <div th:if="${#fields.hasErrors('firstName')}" class="text-red-500 text-xs mt-1">
                    <span th:errors="*{firstName}"></span>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Last Name</label>
                <input type="text" th:field="*{lastName}"
                       class="w-full p-2 border rounded mt-1"
                       :class="${#fields.hasErrors('lastName') ? 'border-red-500' : ''}"
                       required>
                <div th:if="${#fields.hasErrors('lastName')}" class="text-red-500 text-xs mt-1">
                    <span th:errors="*{lastName}"></span>
                </div>
            </div>
        </div>
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700">Email Address</label>
            <input type="email" th:field="*{email}"
                   class="w-full p-2 border rounded mt-1"
                   :class="${#fields.hasErrors('email') ? 'border-red-500' : ''}"
                   required>
            <div th:if="${#fields.hasErrors('email')}" class="text-red-500 text-xs mt-1">
                <span th:errors="*{email}"></span>
            </div>
        </div>
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700">Password</label>
            <input type="password" th:field="*{password}"
                   class="w-full p-2 border rounded mt-1"
                   :class="${#fields.hasErrors('password') ? 'border-red-500' : ''}"
                   required>
            <div th:if="${#fields.hasErrors('password')}" class="text-red-500 text-xs mt-1">
                <span th:errors="*{password}"></span>
            </div>
            <div class="mt-1 text-xs text-gray-500">
                • At least 6 characters<br>
                • At least one uppercase letter<br>
                • At least one lowercase letter<br>
                • At least one number
            </div>
        </div>
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700">Your Role</label>
            <select th:field="*{roleId}" class="w-full p-2 border rounded mt-1 bg-white">
                <option th:each="role : ${roles}"
                        th:value="${role.id}"
                        th:text="${role.name}">
                </option>
            </select>
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700 transition">Register</button>
    </form>
    <p class="mt-4 text-center text-sm text-gray-600">
        Already have an account? <a href="/login" class="text-blue-600 hover:underline">Login here</a>
    </p>
</div>
</body>
</html>
