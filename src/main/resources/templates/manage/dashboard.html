<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>TeamTask - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
<div th:replace="~{fragments/navbar :: header}"></div>

<main class="max-w-6xl mx-auto p-8">
    <h1 class="text-3xl font-bold text-gray-800 mb-8">System Management</h1>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        <a th:href="@{/manage/users}" class="group bg-white p-8 rounded-xl shadow-sm border border-gray-200 hover:border-blue-500 transition-all text-center hover:shadow-md">
            <div class="text-4xl mb-4 flex justify-center text-gray-600 group-hover:text-blue-600">
                <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
                </svg>
            </div>
            <h2 class="text-xl font-bold text-gray-800 group-hover:text-blue-600">Users</h2>
            <p class="text-gray-500 mt-2">Manage accounts and assign system roles.</p>
        </a>

        <a th:href="@{/manage/roles}" class="group bg-white p-8 rounded-xl shadow-sm border border-gray-200 hover:border-blue-500 transition-all text-center hover:shadow-md">
            <div class="text-4xl mb-4 flex justify-center text-gray-600 group-hover:text-blue-600">
                <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                </svg>
            </div>
            <h2 class="text-xl font-bold text-gray-800 group-hover:text-blue-600">Roles</h2>
            <p class="text-gray-500 mt-2">Define user permissions and access levels.</p>
        </a>

        <a th:href="@{/manage/stages}" class="group bg-white p-8 rounded-xl shadow-sm border border-gray-200 hover:border-blue-500 transition-all text-center hover:shadow-md">
            <div class="text-4xl mb-4 flex justify-center text-gray-600 group-hover:text-blue-600">
                <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
                </svg>
            </div>
            <h2 class="text-xl font-bold text-gray-800 group-hover:text-blue-600">Task Stages</h2>
            <p class="text-gray-500 mt-2">Configure workflow steps and status colors.</p>
        </a>
    </div>
</main>
</body>
</html>
