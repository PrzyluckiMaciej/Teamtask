<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register User - TeamTask</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
<div th:replace="~{fragments/navbar :: header}"></div>

<main class="max-w-lg mx-auto p-8">
    <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-200">
        <h2 class="text-xl font-bold mb-6 text-gray-800">Register New Team Member</h2>

        <form th:action="@{/manage/users}" th:object="${user}" method="post">
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">First Name</label>
                    <input type="text" th:field="*{firstName}"
                           class="w-full p-2 border rounded mt-1 shadow-sm"
                           :class="${#fields.hasErrors('firstName') ? 'border-red-500' : ''}"
                           required>
                    <div th:if="${#fields.hasErrors('firstName')}" class="text-red-500 text-xs mt-1">
                        <span th:errors="*{firstName}"></span>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Last Name</label>
                    <input type="text" th:field="*{lastName}"
                           class="w-full p-2 border rounded mt-1 shadow-sm"
                           :class="${#fields.hasErrors('lastName') ? 'border-red-500' : ''}"
                           required>
                    <div th:if="${#fields.hasErrors('lastName')}" class="text-red-500 text-xs mt-1">
                        <span th:errors="*{lastName}"></span>
                    </div>
                </div>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700">Email Address</label>
                <input type="email" th:field="*{email}"
                       class="w-full p-2 border rounded mt-1 shadow-sm"
                       :class="${#fields.hasErrors('email') ? 'border-red-500' : ''}"
                       required>
                <div th:if="${#fields.hasErrors('email')}" class="text-red-500 text-xs mt-1">
                    <span th:errors="*{email}"></span>
                </div>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700">Initial Password</label>
                <input type="password" th:field="*{password}"
                       class="w-full p-2 border rounded mt-1 shadow-sm"
                       :class="${#fields.hasErrors('password') ? 'border-red-500' : ''}"
                       required>
                <div th:if="${#fields.hasErrors('password')}" class="text-red-500 text-xs mt-1">
                    <span th:errors="*{password}"></span>
                </div>
                <div class="mt-1 text-xs text-gray-500">
                    • At least 6 characters<br>
                    • At least one uppercase letter<br>
                    • At least one lowercase letter<br>
                    • At least one number
                </div>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700">System Role</label>
                <select name="roleId" class="w-full p-2 border rounded mt-1 bg-white shadow-sm" required>
                    <option th:each="role : ${roles}" th:value="${role.id}" th:text="${role.name}"></option>
                </select>
            </div>

            <div class="flex items-center justify-between pt-4">
                <a th:href="@{/manage/users}" class="text-gray-500 hover:underline text-sm">Cancel</a>
                <button type="submit" class="bg-blue-600 text-white px-8 py-2 rounded-lg font-bold hover:bg-blue-700 transition">
                    Create User
                </button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
