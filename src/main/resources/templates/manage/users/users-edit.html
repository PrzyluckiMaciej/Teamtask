<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit User - TeamTask</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
<div th:replace="~{fragments/navbar :: header}"></div>

<main class="max-w-lg mx-auto p-8">
    <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-200">
        <h2 class="text-xl font-bold mb-6">Edit User Account</h2>

        <form th:action="@{/manage/users/{id}(id=${user.id})}" th:method="put">
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">First Name</label>
                    <input type="text" name="firstName" th:value="${user.firstName}"
                           class="w-full p-2 border rounded mt-1 shadow-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Last Name</label>
                    <input type="text" name="lastName" th:value="${user.lastName}"
                           class="w-full p-2 border rounded mt-1 shadow-sm">
                </div>
            </div>

            <!-- Add admin warning here -->
            <div th:if="${user.role.name.equalsIgnoreCase('Admin')}" class="mb-4 p-3 bg-amber-50 border border-amber-200 rounded">
                <div class="flex items-center">
                    <svg class="w-5 h-5 text-amber-500 mr-2" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
                    </svg>
                    <span class="text-sm text-amber-700 font-medium">
                <strong>Admin User</strong> – Changing this role may affect system accessibility.
            </span>
                </div>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700">Assign New Role</label>
                <select name="roleId" class="w-full p-2 border rounded mt-1 bg-white shadow-sm">
                    <option th:each="role : ${roles}"
                            th:value="${role.id}"
                            th:text="${role.name}"
                            th:selected="${user.role.id == role.id}">
                    </option>
                </select>
            </div>

            <div class="flex items-center justify-between mt-6">
                <a th:href="@{/manage/users}" class="text-gray-500 hover:underline text-sm">Cancel</a>
                <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 transition">
                    Update User
                </button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
