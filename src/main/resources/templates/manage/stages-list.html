<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Stages - TeamTask</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
<div th:replace="~{fragments/navbar :: header}"></div>

<main class="max-w-4xl mx-auto p-8">
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-2xl font-bold text-gray-800">Task Stages</h1>
        <a th:href="@{/manage}" class="text-sm text-gray-500 hover:text-blue-600">Back to Menu</a>
    </div>

    <div class="bg-white p-6 rounded-xl shadow-sm border mb-8">
        <h2 class="font-bold mb-4">Add New Stage</h2>
        <form th:action="@{/manage/stages}" method="post" class="flex gap-4">
            <input type="text" name="name" placeholder="Stage Name (e.g. READY)" class="flex-1 p-2 border rounded" required>
            <input type="color" name="color" value="#3B82F6" class="h-10 w-20 border rounded cursor-pointer">
            <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded font-bold hover:bg-blue-700">Add</button>
        </form>
    </div>

    <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
        <table class="w-full text-left">
            <thead class="bg-gray-50 border-b">
            <tr>
                <th class="px-6 py-3 text-xs font-bold uppercase text-gray-500">Preview</th>
                <th class="px-6 py-3 text-xs font-bold uppercase text-gray-500">Name</th>
                <th class="px-6 py-3 text-xs font-bold uppercase text-gray-500 text-right">Actions</th>
            </tr>
            </thead>
            <tbody class="divide-y">
            <tr th:each="stage : ${stages}">
                <td class="px-6 py-4">
                        <span th:text="${stage.name}"
                              th:style="'background-color: ' + ${stage.color} + '22; color: ' + ${stage.color} + '; border: 1px solid ' + ${stage.color}"
                              class="px-2.5 py-0.5 rounded-full text-xs font-bold"></span>
                </td>
                <td class="px-6 py-4">
                    <span th:text="${stage.name}"></span>
                    <span th:if="${stage.default}" class="ml-2 text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded">Default</span>
                </td>
                <td class="px-6 py-4 text-right">
                    <form th:if="${!stage.default}" th:action="@{/manage/stages/default/{id}(id=${stage.id})}" method="post" class="inline">
                        <button type="submit" class="text-blue-600 hover:underline text-sm">Set Default</button>
                    </form>
                </td>
                <td class="px-6 py-4 text-right">
                    <div class="flex justify-end items-center gap-3">
                        <a th:href="@{/manage/stages/edit/{id}(id=${stage.id})}"
                           class="text-blue-600 hover:underline text-sm font-medium">Edit</a>

                        <th:block th:with="inUse=${usageMap.get(stage.id)}">

                            <form th:if="${!stage.default && !inUse}"
                                  th:action="@{/manage/stages/{id}(id=${stage.id})}"
                                  th:method="delete"
                                  onsubmit="return confirm('Are you sure?')">
                                <button type="submit" class="text-red-600 hover:underline text-sm font-medium">
                                    Delete
                                </button>
                            </form>

                            <span th:if="${stage.default}"
                                  class="text-xs font-bold text-gray-400 uppercase bg-gray-100 px-2 py-1 rounded">
                                Default
                            </span>
                            <span th:if="${!stage.default && inUse}"
                                  class="text-xs font-bold text-orange-400 uppercase bg-orange-50 px-2 py-1 rounded">
                            In Use
                        </span>

                        </th:block>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
