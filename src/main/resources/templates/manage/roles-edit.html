<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Role - TeamTask</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
<div th:replace="~{fragments/navbar :: header}"></div>

<main class="max-w-lg mx-auto p-8">
    <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-200">
        <h2 class="text-xl font-bold mb-6 text-gray-800">Edit Role Name</h2>

        <form th:action="@{/manage/roles/{id}(id=${role.id})}" th:object="${role}" th:method="put">
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Role Name</label>
                <input type="text" th:field="*{name}"
                       class="w-full p-3 border rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 outline-none"
                       required>
                <p class="mt-2 text-xs text-gray-400 italic">
                    Note: Changing a role name will immediately update the permissions for all users assigned to this role.
                </p>
            </div>

            <div class="flex items-center justify-between pt-4 border-t">
                <a th:href="@{/manage/roles}" class="text-gray-500 hover:underline text-sm">Cancel</a>
                <button type="submit" class="bg-blue-600 text-white px-8 py-2 rounded-lg font-bold hover:bg-blue-700 transition">
                    Save Changes
                </button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
