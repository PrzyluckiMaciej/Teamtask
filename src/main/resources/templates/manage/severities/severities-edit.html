<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Severity - TeamTask</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
<div th:replace="~{fragments/navbar :: header}"></div>

<main class="max-w-lg mx-auto p-8">
    <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-200">
        <h2 class="text-xl font-bold mb-6 text-gray-800">Edit Severity Level</h2>

        <!-- Add error/success messages -->
        <div th:if="${error}" class="mb-4 p-3 bg-red-100 border-l-4 border-red-500 text-red-700 text-sm">
            <span th:text="${error}"></span>
        </div>

        <div th:if="${success}" class="mb-4 p-3 bg-green-100 border-l-4 border-green-500 text-green-700 text-sm">
            <span th:text="${success}"></span>
        </div>

        <!-- Change form to use @RequestParam binding -->
        <form th:action="@{/manage/severities/{id}(id=${severity.id})}" th:method="put">
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Severity Level</label>
                <input type="text" name="severity" th:value="${severity.severity}"
                       class="w-full p-3 border rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 outline-none"
                       required>
                <p class="mt-2 text-xs text-gray-400 italic">
                    Note: Changing a severity level will immediately update all tasks assigned with this severity.
                </p>
            </div>

            <div class="flex items-center justify-between pt-4 border-t">
                <a th:href="@{/manage/severities}" class="text-gray-500 hover:underline text-sm">Cancel</a>
                <button type="submit" class="bg-blue-600 text-white px-8 py-2 rounded-lg font-bold hover:bg-blue-700 transition">
                    Save Changes
                </button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
