<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Users - TeamTask</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
<div th:replace="~{fragments/navbar :: header}"></div>

<main class="max-w-6xl mx-auto p-8">
    <div th:if="${error}" class="mb-4 p-4 bg-red-100 border-l-4 border-red-500 text-red-700">
        <p class="text-sm font-bold" th:text="${error}"></p>
    </div>

    <div class="flex justify-between items-center mb-8">
        <h1 class="text-2xl font-bold text-gray-800">Users</h1>
        <div class="flex gap-4">
            <a th:href="@{/manage/users/new}"
               class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-blue-700 transition shadow-sm">
                + Register New User
            </a>
            <a th:href="@{/manage}" class="inline-flex items-center text-sm font-medium text-gray-500 hover:text-blue-600 transition-colors group">
                <svg class="w-4 h-4 mr-1 transform group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
                Back to Menu
            </a>
        </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <table class="w-full text-left border-collapse">
            <thead class="bg-gray-50 border-b border-gray-200 text-gray-500 text-xs uppercase font-bold">
            <tr>
                <th class="px-6 py-4">Full Name</th>
                <th class="px-6 py-4">Email</th>
                <th class="px-6 py-4">Role</th>
                <th class="px-6 py-4 text-center">Edit</th>
                <th class="px-6 py-4 text-right">Delete</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-gray-100">
            <tr th:each="user : ${users}" class="hover:bg-gray-50 transition">
                <td class="px-6 py-4 font-medium text-gray-900" th:text="${user.firstName + ' ' + user.lastName}">Name</td>
                <td class="px-6 py-4 text-gray-600" th:text="${user.email}">email@example.com</td>
                <td class="px-6 py-4">
                    <span class="px-2 py-1 rounded-md text-xs font-bold bg-blue-100 text-blue-700 uppercase"
                          th:text="${user.role.name}">ROLE</span>
                </td>
                <td class="px-6 py-4 text-center">
                    <a th:href="@{/manage/users/edit/{id}(id=${user.id})}"
                       class="inline-block text-gray-500 hover:text-blue-600 transition-colors">
                        <svg class="w-5 h-5 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                        </svg>
                    </a>
                </td>
                <td class="px-6 py-4 text-right">
                    <form th:action="@{/manage/users/{id}(id=${user.id})}"
                          th:method="delete"
                          class="m-0 p-0"
                          onsubmit="return confirm('Delete this user?')">
                        <button type="submit" class="text-gray-400 hover:text-red-600 transition-colors">
                            <svg class="w-5 h-5 ml-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                            </svg>
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
