<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Users - TeamTask</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
<div th:replace="~{fragments/navbar :: header}"></div>

<main class="max-w-6xl mx-auto p-8">
    <div th:if="${error}" class="mb-4 p-4 bg-red-100 border-l-4 border-red-500 text-red-700">
        <p class="text-sm font-bold" th:text="${error}"></p>
    </div>

    <div class="flex justify-between items-center mb-8">
        <h1 class="text-2xl font-bold text-gray-800">User Management</h1>
        <div class="flex gap-4">
            <a th:href="@{/manage/users/new}"
               class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-blue-700 transition shadow-sm">
                + Register New User
            </a>
            <a th:href="@{/manage}" class="text-sm text-gray-500 hover:text-gray-700 self-center">Back to Menu</a>
        </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <table class="w-full text-left border-collapse">
            <thead class="bg-gray-50 border-b border-gray-200 text-gray-600 text-sm uppercase font-semibold">
            <tr>
                <th class="px-6 py-4">Full Name</th>
                <th class="px-6 py-4">Email</th>
                <th class="px-6 py-4">Role</th>
                <th class="px-6 py-4 text-right">Actions</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-gray-100">
            <tr th:each="user : ${users}" class="hover:bg-gray-50 transition">
                <td class="px-6 py-4 font-medium text-gray-900" th:text="${user.firstName + ' ' + user.lastName}">Name</td>
                <td class="px-6 py-4 text-gray-600" th:text="${user.email}">email@example.com</td>
                <td class="px-6 py-4">
                        <span class="px-2 py-1 rounded-md text-xs font-bold bg-blue-100 text-blue-700 uppercase"
                              th:text="${user.role.name}">ROLE</span>
                </td>
                <td class="px-6 py-4">
                    <div class="flex justify-end items-center gap-4">

                        <a th:href="@{/manage/users/edit/{id}(id=${user.id})}"
                           class="text-blue-600 hover:text-blue-800 text-sm font-medium leading-none">
                            Edit
                        </a>

                        <form th:action="@{/manage/users/{id}(id=${user.id})}"
                              th:method="delete"
                              class="m-0 p-0 inline-flex items-center"
                              onsubmit="return confirm('Delete this user?')">

                            <button type="submit"
                                    class="text-red-600 hover:text-red-800 text-sm font-medium leading-none p-0 border-none bg-transparent cursor-pointer">
                                Delete
                            </button>
                        </form>

                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
