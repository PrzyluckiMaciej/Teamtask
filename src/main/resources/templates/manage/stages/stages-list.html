<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Stages - TeamTask</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
<div th:replace="~{fragments/navbar :: header}"></div>

<main class="max-w-4xl mx-auto p-8">
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-2xl font-bold text-gray-800">Task Stages</h1>

        <a th:href="@{/manage}" class="inline-flex items-center text-sm font-medium text-gray-500 hover:text-blue-600 transition-colors group">
            <svg class="w-4 h-4 mr-1 transform group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
            </svg>
            Back to Menu
        </a>
    </div>

    <div class="bg-white p-6 rounded-xl shadow-sm border mb-8">
        <h2 class="font-bold mb-4">Add New Stage</h2>
        <form th:action="@{/manage/stages}" method="post" class="flex gap-4">
            <input type="text" name="name" placeholder="Stage Name (e.g. READY)" class="flex-1 p-2 border rounded" required>
            <input type="number" name="position" class="p-2 border rounded shadow-sm w-24" placeholder="0" required>
            <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded font-bold hover:bg-blue-700">Add</button>
        </form>
    </div>

    <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
        <table class="w-full text-left">
            <thead class="bg-gray-50 border-b">
            <tr>
                <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Position</th>
                <th class="px-6 py-3 text-xs font-bold uppercase text-gray-500">Name</th>
                <th class="px-6 py-3 text-xs font-bold uppercase text-gray-500">Status</th>
                <th class="px-6 py-3 text-xs font-bold uppercase text-gray-500">Default Setting</th>
                <th class="px-6 py-3 text-xs font-bold uppercase text-gray-500 text-center">Edit</th>
                <th class="px-6 py-3 text-xs font-bold uppercase text-gray-500 text-right">Delete</th>
            </tr>
            </thead>

            <tbody class="divide-y">
            <tr th:each="stage : ${stages}" th:with="inUse=${usageMap.get(stage.id)}">
                <td class="px-6 py-4 text-sm font-medium text-gray-600" th:text="${stage.position}">1</td>

                <td class="px-6 py-4">
                    <span th:text="${stage.name}" class="font-medium text-gray-900"></span>
                </td>

                <td class="px-6 py-4">
                    <span th:if="${inUse}" class="inline-flex items-center text-xs font-semibold text-orange-600 bg-orange-50 px-2 py-1 rounded">
                        <span class="w-1.5 h-1.5 mr-1.5 rounded-full bg-orange-400"></span>
                        IN USE
                    </span>
                    <span th:unless="${inUse}" class="text-xs text-gray-400 italic">Unused</span>
                </td>

                <td class="px-6 py-4">
                    <form th:if="${!stage.default}" th:action="@{/manage/stages/default/{id}(id=${stage.id})}" method="post" class="m-0">
                        <button type="submit" class="text-sm text-blue-600 hover:text-blue-800 font-medium">
                            Make Default
                        </button>
                    </form>
                    <span th:if="${stage.default}" class="text-sm text-gray-400 font-medium flex items-center">
                        <svg class="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path>
                        </svg>
                        Current
                    </span>
                </td>

                <td class="px-6 py-4 text-center">
                    <a th:href="@{/manage/stages/edit/{id}(id=${stage.id})}"
                       class="inline-block text-gray-500 hover:text-blue-600 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                        </svg>
                    </a>
                </td>

                <td class="px-6 py-4 text-right">
                    <form th:if="${!stage.default && !inUse}"
                          th:action="@{/manage/stages/{id}(id=${stage.id})}"
                          th:method="delete"
                          class="m-0"
                          onsubmit="return confirm('Are you sure you want to delete this stage?')">
                        <button type="submit" class="text-gray-400 hover:text-red-600 transition-colors">
                            <svg class="w-5 h-5 ml-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                            </svg>
                        </button>
                    </form>
                    <div th:if="${stage.default || inUse}" class="group relative inline-block">
                        <svg class="w-5 h-5 ml-auto text-gray-200" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"></path>
                        </svg>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
