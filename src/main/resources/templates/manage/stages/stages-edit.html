<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Stage - TeamTask</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
<div th:replace="~{fragments/navbar :: header}"></div>

<main class="max-w-4xl mx-auto p-8">
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="px-8 py-5 border-b border-gray-100 flex items-center justify-between bg-gray-50/50">
            <div>
                <h2 class="text-xl font-bold text-gray-800">Edit Task Stage</h2>
                <p class="text-sm text-gray-500">Configure how this stage appears across your workspace.</p>
            </div>
            <span th:if="${stage.default}"
                  class="text-xs bg-gray-200 text-gray-600 px-2 py-1 rounded-md font-bold uppercase">
                    Default Stage
                </span>
        </div>

        <form th:action="@{/manage/stages/{id}(id=${stage.id})}" th:object="${stage}" th:method="put">
            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{default}">

            <div class="flex flex-col md:flex-row">
                <div class="flex-1 p-8 space-y-6 border-r border-gray-100">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Stage Name</label>
                        <input type="text" th:field="*{name}" id="stage-name-input"
                               class="w-full p-3 border rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 outline-none transition"
                               placeholder="e.g., IN REVIEW" required>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Display Position</label>
                        <input type="number" th:field="*{position}"
                               class="w-full p-3 border rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 outline-none" required>
                        <p class="mt-1 text-xs text-gray-400">Lower numbers appear first (e.g., 0, 1, 2).</p>
                    </div>
                </div>
            </div>

            <div class="px-8 py-4 bg-gray-50 border-t border-gray-100 flex items-center justify-end gap-6">
                <a th:href="@{/manage/stages}" class="text-sm text-gray-500 hover:text-gray-700 font-medium">
                    Cancel
                </a>
                <button type="submit"
                        class="bg-blue-600 text-white px-8 py-2.5 rounded-lg font-bold hover:bg-blue-700 transition shadow-md active:scale-95">
                    Save Changes
                </button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
