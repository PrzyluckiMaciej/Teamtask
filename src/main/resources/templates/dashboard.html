<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>TeamTask - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
<nav class="bg-white shadow-sm border-b px-6 py-4 flex justify-between items-center">
    <h1 class="text-xl font-bold text-blue-600">TeamTask Dashboard</h1>
    <div class="flex items-center gap-4">
        <span class="text-gray-600" th:text="${#authentication.name}">User</span>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="text-sm text-red-500 hover:underline">Logout</button>
        </form>
    </div>
</nav>

<main class="p-8">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-semibold">Active Tasks</h2>
        <a href="#" class="bg-blue-600 text-white px-4 py-2 rounded shadow hover:bg-blue-700">+ New Task</a>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div th:each="task : ${tasks}" class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
            <div class="flex justify-between items-start mb-4">
                <h3 class="font-bold text-lg text-gray-800" th:text="${task.title}">Task Title</h3>
                <span th:text="${task.stage}"
                      class="px-2 py-1 text-xs font-semibold rounded bg-blue-100 text-blue-700">
                        STAGE
                    </span>
            </div>
            <p class="text-gray-600 text-sm mb-4" th:text="${task.description}">Description goes here...</p>
            <div class="border-t pt-4 flex justify-between items-center text-xs text-gray-500">
                <span>Assignee: <strong th:text="${task.assignee != null ? task.assignee.firstName : 'Unassigned'}">Name</strong></span>
                <span th:text="${#temporals.format(task.createdAt, 'dd-MM-yyyy')}">Date</span>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(tasks)}" class="col-span-full text-center py-12 text-gray-400 italic">
            No tasks found. Create one to get started!
        </div>
    </div>
</main>
</body>
</html>
