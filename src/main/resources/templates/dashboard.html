<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>TeamTask - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles for better scrolling */
        .dashboard-container {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch; /* Smooth scrolling on iOS */
        }

        .stages-container {
            display: flex;
            min-width: max-content; /* Ensures container is as wide as all columns */
            padding: 0 1rem; /* Add padding so edge columns aren't flush with edges */
        }

        .stage-column {
            flex-shrink: 0; /* Prevent columns from shrinking */
            width: 260px; /* Fixed width for consistency */
            margin-right: 1.5rem; /* Spacing between columns */
        }

        /* Custom scrollbar styling */
        .dashboard-container::-webkit-scrollbar {
            height: 8px;
        }

        .dashboard-container::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 4px;
        }

        .dashboard-container::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .dashboard-container::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="bg-gray-50">
<div th:replace="~{fragments/navbar :: header}"></div>

<main class="p-6">
    <!-- Compact Filter Panel -->
    <div class="max-w-7xl mx-auto mb-6 bg-white p-4 rounded-lg shadow-sm border border-gray-200">
        <form th:action="@{/dashboard}" method="get" class="space-y-3">
            <!-- Single row for all filters - optimized column spans -->
            <div class="grid grid-cols-1 md:grid-cols-8 gap-3">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Assigned To</label>
                    <select name="assigneeId" class="w-full p-2 bg-gray-50 border border-gray-300 rounded text-sm">
                        <option value="">All Team Members</option>
                        <option th:each="user : ${users}"
                                th:value="${user.id}"
                                th:text="${user.firstName + ' ' + user.lastName}"
                                th:selected="${user.id == selectedAssigneeId}"></option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Severity</label>
                    <select name="severityId" class="w-full p-2 bg-gray-50 border border-gray-300 rounded text-sm">
                        <option value="">All</option>
                        <option th:each="severity : ${severities}"
                                th:value="${severity.id}"
                                th:text="${severity.severity}"
                                th:selected="${severity.id == selectedSeverityId}"></option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Type</label>
                    <select name="taskTypeId" class="w-full p-2 bg-gray-50 border border-gray-300 rounded text-sm">
                        <option value="">All</option>
                        <option th:each="type : ${taskTypes}"
                                th:value="${type.id}"
                                th:text="${type.type}"
                                th:selected="${type.id == selectedTaskTypeId}"></option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Version</label>
                    <select name="fixVersionId" class="w-full p-2 bg-gray-50 border border-gray-300 rounded text-sm">
                        <option value="">All</option>
                        <option th:each="version : ${fixVersions}"
                                th:value="${version.id}"
                                th:text="${version.version}"
                                th:selected="${version.id == selectedFixVersionId}"></option>
                    </select>
                </div>

                <div class="md:col-span-2">
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Date Range</label>
                    <div class="flex gap-2">
                        <input type="date" name="startDate" th:value="${selectedStartDate}"
                               class="w-full p-2 bg-gray-50 border border-gray-300 rounded text-sm"
                               placeholder="From">
                        <span class="self-center text-gray-400">→</span>
                        <input type="date" name="endDate" th:value="${selectedEndDate}"
                               class="w-full p-2 bg-gray-50 border border-gray-300 rounded text-sm"
                               placeholder="To">
                    </div>
                </div>

                <div class="md:col-span-2">
                    <div class="flex items-end gap-2 h-full">
                        <button type="submit"
                                class="w-full bg-blue-600 text-white px-3 py-2 rounded text-sm font-bold hover:bg-blue-700 transition">
                            Filter
                        </button>
                        <a th:href="@{/dashboard}"
                           class="w-full bg-gray-200 text-gray-700 px-3 py-2 rounded text-sm font-bold hover:bg-gray-300 transition text-center">
                            Reset
                        </a>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <!-- Dashboard Container with proper scrolling -->
    <div class="dashboard-container">
        <div class="stages-container">
            <!-- Stage Columns -->
            <div th:each="stage : ${stages}" class="stage-column bg-gray-100 rounded-lg p-4">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-bold text-gray-700 uppercase tracking-wider text-sm" th:text="${stage.name}">STAGE NAME</h2>
                    <span class="text-sm font-semibold text-gray-600" th:text="${#lists.size(tasks.?[stage.id == __${stage.id}__])}">0</span>
                </div>

                <div class="space-y-4 min-h-[100px]">
                    <div th:each="task : ${tasks}" th:if="${task.stage.id == stage.id}"
                         class="bg-white p-4 rounded shadow-sm border hover:shadow-md transition-shadow">
                        <!-- Top row with Task Type (left) and Severity (right) -->
                        <div class="flex justify-between items-center mb-3">
                            <!-- Task Type Badge on the left -->
                            <div>
                                <span th:if="${task.taskType != null}"
                                      class="inline-flex items-center px-2.5 py-1.5 rounded-full text-xs font-medium bg-gray-100 text-gray-800">
                                    <svg class="w-3 h-3 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                              d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                                    </svg>
                                    <span th:text="${task.taskType.type}">Task Type</span>
                                </span>
                                <span th:if="${task.taskType == null}"
                                      class="inline-flex items-center px-2.5 py-1.5 rounded-full text-xs font-medium bg-gray-100 text-gray-400">
                                    <svg class="w-3 h-3 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                              d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                                    </svg>
                                    No Type
                                </span>
                            </div>

                            <!-- Severity Badge on the right -->
                            <div th:if="${task.severity != null}">
                                <span class="inline-flex items-center px-2.5 py-1.5 rounded text-xs font-bold"
                                      th:style="'background-color: ' + ${task.severity.color} + '22; color: ' + ${task.severity.color} + '; border: 1px solid ' + ${task.severity.color}">
                                    <span class="w-1.5 h-1.5 rounded-full mr-1.5"
                                          th:style="'background-color: ' + ${task.severity.color}"></span>
                                    <span th:text="${task.severity.severity}">Severity</span>
                                </span>
                            </div>
                            <div th:if="${task.severity == null}">
                                <span class="inline-flex items-center px-2.5 py-1.5 rounded text-xs font-medium text-gray-400 bg-gray-50">
                                    <span class="w-1.5 h-1.5 rounded-full mr-1.5 bg-gray-300"></span>
                                    No Priority
                                </span>
                            </div>
                        </div>

                        <!-- Task Title -->
                        <a th:href="@{/tasks/{id}(id=${task.id})}"
                           class="font-semibold hover:underline block mb-3 text-gray-800 text-sm"
                           th:text="${task.title}">Task Title</a>

                        <!-- Assignee's full name -->
                        <div class="mt-3">
                            <div class="flex items-center">
                                <div class="flex items-center bg-gray-100 px-3 py-1.5 rounded-md w-full justify-center">
                                    <span class="text-xs font-medium text-gray-800"
                                          th:text="${task.assignee != null ? task.assignee.firstName + ' ' + task.assignee.lastName : 'Unassigned'}">
                                        Assignee's Full Name
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Empty state for columns with no tasks -->
                    <div th:if="${#lists.size(tasks.?[stage.id == __${stage.id}__]) == 0}"
                         class="text-center py-8 text-gray-400 text-sm">
                        <svg class="w-12 h-12 mx-auto mb-2 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                        </svg>
                        No tasks in this stage
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
