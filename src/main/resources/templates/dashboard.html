<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>TeamTask - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
<div th:replace="~{fragments/navbar :: header}"></div>

<main class="p-8 flex justify-center">
    <div class="flex flex-nowrap gap-6 overflow-x-auto pb-4 justify-center w-full">

        <div th:each="stage : ${stages}" class="flex-shrink-0 w-60 bg-gray-100 rounded-lg p-4">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-bold text-gray-700 uppercase tracking-wider text-sm" th:text="${stage.name}">STAGE NAME</h2>
                <span th:text="${#lists.size(tasks.?[stage.id == __${stage.id}__])}">0</span>
            </div>

            <div class="space-y-4">
                <div th:each="task : ${tasks}" th:if="${task.stage.id == stage.id}"
                     class="bg-white p-4 rounded shadow-sm border-l-4 hover:shadow-md transition-shadow"
                     th:style="'border-color: ' + ${stage.color}">

                    <a th:href="@{/tasks/{id}(id=${task.id})}"
                       class="font-semibold hover:underline block mb-2"
                       th:style="'color: ' + ${stage.color}"
                       th:text="${task.title}">Task Title</a>

                    <div class="flex items-center mt-2">
                        <div class="flex items-center bg-gray-100 px-2 py-1 rounded-md">
                            <span class="text-sm font-medium text-gray-800"
                                  th:text="${task.assignee != null ? task.assignee.firstName + ' ' + task.assignee.lastName : 'Unassigned'}">
                                Assignee Full Name
                            </span>
                        </div>
                    </div>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(tasks)}" class="col-span-full text-center py-12 text-gray-400 italic">
                No tasks found. Create one to get started!
            </div>
        </div>
    </div>
</main>
</body>
</html>
